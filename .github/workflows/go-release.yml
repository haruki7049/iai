name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            output: iai-linux-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            output: iai-windows-amd64.exe
          - os: macos-latest
            goos: darwin
            goarch: amd64
            output: iai-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            output: iai-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      # Install dependencies for Ebitengine on Linux
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            libasound2-dev \
            libgl1-mesa-dev

      # Build the application
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.output }} main.go

      # Upload the built binary to GitHub Releases
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.output }}
